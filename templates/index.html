<!DOCTYPE html>
<html>
<head>
    <title>Employee Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        input {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 10px 16px;
            margin: 6px 4px 6px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .add-btn { background: #28a745; color: white; }
        .update-btn { background: #fd7e14; color: white; }
        .edit-btn { background: #007bff; color: white; }
        .delete-btn { background: #dc3545; color: white; }

        .card {
            background: #fafafa;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
        }

        .btn-row {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Employee Management</h2>

        <input type="text" id="name" placeholder="Name">
        <input type="text" id="role" placeholder="Role">
        <input type="number" id="salary" placeholder="Salary">

        <button class="add-btn" onclick="addEmployee()">Add</button>
        <button class="update-btn" onclick="updateEmployee()">Update</button>

        <h2>Employee List</h2>
        <div id="list"></div>
    </div>

    <script>
        let selectedId = null;

        function addEmployee() {
            const name = document.getElementById("name").value.trim();
            const role = document.getElementById("role").value.trim();
            const salary = document.getElementById("salary").value.trim();

            fetch('http://127.0.0.1:5000/add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: name,
                    role: role,
                    salary: parseInt(salary)
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                document.getElementById("name").value = "";
                document.getElementById("role").value = "";
                document.getElementById("salary").value = "";
                selectedId = null;
                loadEmployees();
            })
            .catch(err => console.error("Add error:", err));
        }

        function loadEmployees() {
            fetch('http://127.0.0.1:5000/employees')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("list");
                list.innerHTML = "";

                data.forEach(emp => {
                    const card = document.createElement("div");
                    card.className = "card";

                    const text = document.createElement("div");
                    text.innerHTML =
                        "<b>Name:</b> " + emp.name + "<br>" +
                        "<b>Role:</b> " + emp.role + "<br>" +
                        "<b>Salary:</b> ₹" + emp.salary + "<br>" +
                        "<b>ID:</b> " + emp.id;

                    const btnRow = document.createElement("div");
                    btnRow.className = "btn-row";

                    const editBtn = document.createElement("button");
                    editBtn.className = "edit-btn";
                    editBtn.textContent = "Edit";
                    editBtn.onclick = function () {
                        selectEmployee(emp.id, emp.name, emp.role, emp.salary);
                    };

                    const deleteBtn = document.createElement("button");
                    deleteBtn.className = "delete-btn";
                    deleteBtn.textContent = "Delete";
                    deleteBtn.onclick = function () {
                        deleteEmployee(emp.id);
                    };

                    btnRow.appendChild(editBtn);
                    btnRow.appendChild(deleteBtn);

                    card.appendChild(text);
                    card.appendChild(btnRow);
                    list.appendChild(card);
                });
            })
            .catch(err => console.error("Load error:", err));
        }

        function selectEmployee(id, name, role, salary) {
            selectedId = id;
            document.getElementById("name").value = name;
            document.getElementById("role").value = role;
            document.getElementById("salary").value = salary;
        }

        function updateEmployee() {
            if (!selectedId) {
                alert("Please click Edit on an employee first");
                return;
            }

            const name = document.getElementById("name").value.trim();
            const role = document.getElementById("role").value.trim();
            const salary = document.getElementById("salary").value.trim();

            fetch('http://127.0.0.1:5000/update/' + selectedId, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: name,
                    role: role,
                    salary: parseInt(salary)
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                selectedId = null;
                document.getElementById("name").value = "";
                document.getElementById("role").value = "";
                document.getElementById("salary").value = "";
                loadEmployees();
            })
            .catch(err => console.error("Update error:", err));
        }

        function deleteEmployee(id) {
            fetch('http://127.0.0.1:5000/delete/' + id, {
                method: 'DELETE'
            })
            .then(res => res.json())
            .then(data => {
                alert(data.message);
                loadEmployees();
            })
            .catch(err => console.error("Delete error:", err));
        }

        window.onload = loadEmployees;
    </script>
</body>
</html>
